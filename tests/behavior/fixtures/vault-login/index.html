<!--
  BEHAVIOR-TEST FIXTURE — do not deploy or link from production.
  Used by the `vault-mcp-surface` behavior test (Mission 12, Flight 1, Leg 4) to
  verify that vaultFill populates a REAL top-frame login form over the live
  browser — the username + type=password fields the fill helper targets — without
  the password ever crossing the MCP wire. It lives under tests/behavior/fixtures/
  which is excluded from linting/prettier.

  SERVE (must match the seeded logins' fixtureOrigin — http://127.0.0.1:8099):
  run a tiny static HTTP server from THIS directory on port 8099, e.g.

      python3 -m http.server 8099

  The fixture is then reachable at http://127.0.0.1:8099/. Keep the port distinct
  from the MCP loopback port (49707). Why HTTP (not file://): the MCP drive/nav
  tools refuse non-http(s) schemes, and vault-context.fill exact-origin-matches
  the seeded item's origin against the tab's top-frame origin — both must be
  http://127.0.0.1:8099. If you serve on a different host/port, rebuild the
  fixtures with a matching FIXTURE_ORIGIN (see build-fixtures.mjs).

  The form is NOT auto-submitted by the fill (fill dispatches input/change only),
  and onsubmit is suppressed so a stray Enter cannot navigate the page — step 5
  asserts the page did not navigate.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault Login Fixture</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 420px;
      margin: 3rem auto;
      padding: 1rem;
      background: #101418;
      color: #e0e0e0;
    }
    h1 { color: #f90; font-size: 1.2rem; }
    .marker { color: #0f0; font-size: 0.8rem; margin-bottom: 1.5rem; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.85rem; color: #aaa; }
    input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
      box-sizing: border-box;
      background: #1b2027;
      color: #e0e0e0;
      border: 1px solid #4af;
    }
    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: #243; color: #cfc; border: 1px solid #4c6; cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Vault Login Fixture</h1>
  <div class="marker">vault-login-fixture-loaded</div>

  <form id="login" autocomplete="off">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username">

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password">

    <button id="submit" type="submit">Sign in</button>
  </form>

  <script>
    // Suppress real submission: the fill must never navigate the page (step 5).
    document.getElementById('login').addEventListener('submit', (e) => {
      e.preventDefault();
    });
    console.log('vault-login-fixture-loaded');
  </script>
</body>
</html>
