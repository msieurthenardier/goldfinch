<!--
  DELIBERATELY-HOSTILE TEST FIXTURE — do not deploy or link from production.
  This page is used by the tab-scheme-guard behavior test to exercise every
  hostile-URL vector against the running Goldfinch app over a safe HTTP origin.
  It lives under tests/behavior/fixtures/ which is excluded from linting/prettier.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Scheme Guard Trigger Page</title>
  <style>
    body {
      font-family: monospace;
      max-width: 640px;
      margin: 2rem auto;
      padding: 1rem;
      background: #111;
      color: #e0e0e0;
    }
    h1 { color: #f90; margin-bottom: 0.25rem; }
    .marker { color: #0f0; font-size: 0.85rem; margin-bottom: 2rem; }
    section { margin-bottom: 1.5rem; }
    h2 { color: #aaa; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 0.5rem; }
    button {
      display: block;
      margin-bottom: 0.5rem;
      padding: 0.5rem 1rem;
      background: #222;
      color: #ccc;
      border: 1px solid #555;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
    }
    button:hover { background: #333; border-color: #f90; }
    #open-control { border-color: #0a0; color: #0f0; }
    video { display: block; width: 320px; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>TAB SCHEME GUARD TRIGGER PAGE</h1>
  <div class="marker">trigger-page-loaded</div>

  <section>
    <h2>Hostile window.open() vectors</h2>

    <!-- Vector 1: file: scheme via window.open -->
    <button id="open-file" onclick="window.open('file:///etc/passwd')">
      open file:///etc/passwd (file: scheme)
    </button>

    <!-- Vector 2: javascript: scheme via window.open -->
    <button id="open-javascript">
      open javascript:document.title=&quot;pwned&quot; (javascript: scheme)
    </button>

    <!-- Vector 3: data: scheme via window.open -->
    <button id="open-data" onclick="window.open('data:text/html,<h1>injected</h1>')">
      open data:text/html,&lt;h1&gt;injected&lt;/h1&gt; (data: scheme)
    </button>
  </section>

  <section>
    <h2>In-page self-navigation vector</h2>

    <!-- Vector 4: file: scheme via window.location self-navigation -->
    <button id="nav-file" onclick="window.location = 'file:///etc/passwd'">
      navigate self to file:///etc/passwd (will-navigate guard)
    </button>
  </section>

  <section>
    <h2>Media-panel open-as-tab vector</h2>

    <!-- Vector 5: crafted media element with file: src so Goldfinch media panel
         catalogs a file:-scheme item the Executor can attempt to "open as tab" -->
    <video id="evil-media"
           src="file:///etc/passwd"
           controls
           poster="file:///etc/passwd">
      Your browser does not support the video element.
    </video>
    <a id="evil-media-link" href="file:///etc/passwd">file:///etc/passwd (anchor fallback)</a>
  </section>

  <section>
    <h2>Control — legitimate https: window.open (must NOT be blocked)</h2>

    <!-- Vector 6 / control: safe https: URL — guard must allow this through -->
    <button id="open-control" onclick="window.open('https://example.com/')">
      open https://example.com/ (control — should open)
    </button>
  </section>

  <section>
    <h2>Internal scheme (goldfinch://) spoof vectors</h2>

    <!-- Vector 7: goldfinch:// via window.open — rejected at createTab/isSafeTabUrl (renderer gate) -->
    <button id="open-goldfinch" onclick="window.open('goldfinch://settings')">
      open goldfinch://settings (window.open — should NOT open internal tab)
    </button>

    <!-- Vector 8: goldfinch:// via window.location self-navigation — exercises the
         session-aware will-navigate web branch (still rejects goldfinch://) -->
    <button id="nav-goldfinch" onclick="window.location = 'goldfinch://settings'">
      navigate self to goldfinch://settings (will-navigate guard)
    </button>

    <!-- Vector 9: goldfinch:// embedded as an iframe — must NOT render the settings
         stub from a web origin (no handler + CSP frame-ancestors). Wired in the
         <script> below; result written to a stable element so a blank (pass) iframe
         is distinguishable from "the button never fired". -->
    <button id="embed-goldfinch">
      embed &lt;iframe src=&quot;goldfinch://settings&quot;&gt; (should render blank, not the stub)
    </button>
    <div id="goldfinch-embed-result"></div>

    <!-- Vector 10: goldfinch:// via fetch — must reject (scheme not registered for the
         web session). Result written to a stable element + console. Wired below. -->
    <button id="fetch-goldfinch">
      fetch('goldfinch://settings') (should reject)
    </button>
    <div id="goldfinch-fetch-result"></div>
  </section>

  <script>
    // Wire up the javascript: button here to avoid HTML attribute quoting issues.
    document.getElementById('open-javascript').addEventListener('click', function () {
      window.open('javascript:document.title="pwned"');
    });

    // Vector 9: inject an explicitly sized, bordered iframe pointed at goldfinch://settings.
    // From a web origin this has no handler (and the internal CSP frame-ancestors 'none'),
    // so the frame stays blank — it must NOT render the "Settings — coming soon" stub.
    // We write a positive status so a blank-but-present iframe (the pass state) is
    // distinguishable from a button that never fired.
    document.getElementById('embed-goldfinch').addEventListener('click', function () {
      var iframe = document.createElement('iframe');
      iframe.src = 'goldfinch://settings';
      iframe.id = 'goldfinch-embed-frame';
      iframe.width = '320';
      iframe.height = '120';
      iframe.style.display = 'block';
      iframe.style.marginTop = '0.5rem';
      iframe.style.border = '2px solid #f90';
      iframe.style.background = '#000';
      document.body.appendChild(iframe);
      var msg = 'iframe injected (src=goldfinch://settings)';
      document.getElementById('goldfinch-embed-result').textContent = msg;
      console.log('tab-scheme-guard:', msg);
    });

    // Vector 10: fetch goldfinch://settings from the web origin. Expected to reject
    // (scheme not registered for this session). Mirror the outcome to a stable element
    // and the console so the Validator can read resolved-vs-rejected.
    document.getElementById('fetch-goldfinch').addEventListener('click', function () {
      var out = document.getElementById('goldfinch-fetch-result');
      fetch('goldfinch://settings').then(function () {
        out.textContent = 'resolved';
        console.log('tab-scheme-guard: fetch goldfinch://settings resolved');
      }).catch(function (err) {
        var msg = 'rejected: ' + err;
        out.textContent = msg;
        console.log('tab-scheme-guard: fetch goldfinch://settings ' + msg);
      });
    });

    console.log('tab-scheme-guard fixture loaded');
  </script>

</body>
</html>
