<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'" />
    <title>Find in page</title>
    <link rel="stylesheet" href="find-overlay.css" />
  </head>
  <body>
    <!-- Floating find bar hosted in the overlay WebContentsView (M05 Flight 7, DD1).
         Mirrors the chrome #find-bar control set/IDs; a11y attributes carried over
         verbatim (DD12). Controls wired to the DD4 IPC set in find-overlay.js (Leg 2). -->
    <div id="find-bar" role="search" aria-label="Find in page">
      <input
        id="find-input"
        type="search"
        autocomplete="off"
        spellcheck="false"
        placeholder="Find…"
        aria-label="Find in page"
      />
      <span id="find-count" role="status" aria-live="polite" aria-atomic="true"></span>
      <button id="find-prev" class="icon-btn find-nav-btn" type="button" title="Previous match (Shift+Enter)" aria-label="Previous match">↑</button>
      <button id="find-next" class="icon-btn find-nav-btn" type="button" title="Next match (Enter)" aria-label="Next match">↓</button>
      <button id="find-close" class="icon-btn" type="button" title="Close (Esc)" aria-label="Close find bar">✕</button>
    </div>
    <script src="find-overlay.js"></script>
  </body>
</html>
