<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Passwords — Goldfinch</title>
    <link rel="stylesheet" href="vault.css" />
    <!-- Fully-module page (settings/jars precedent): vault.js is a real ES module
         (type="module") that imports its pure state-model via a flat serving-path
         specifier resolved by internal-page-map.js. No inline script/style — the
         strict internal CSP (default-src 'self') forbids both. -->
    <script src="vault.js" type="module"></script>
  </head>
  <body>
    <main>
      <div class="vault-header">
        <h1>Passwords</h1>
      </div>

      <!-- The controller renders exactly one state region into #vault-root from
           vaultState(). aria-live announces the state transition politely; the
           regions themselves carry their own headings/landmarks. -->
      <div id="vault-root" aria-live="polite"></div>

      <noscript>
        <p>The password manager requires JavaScript.</p>
      </noscript>
    </main>
  </body>
</html>
