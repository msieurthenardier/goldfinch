<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie Jars — Goldfinch</title>
    <link rel="stylesheet" href="jars.css" />
    <!-- Fully-module page (M07 Flight 2 leg 5): burner.js (frozen BURNER
         identity), jar-data-classes.js (pure clearable-data-class list),
         safe-color.js (injection-safe color validator), jar-page-model.js
         (the pure row-model importing burner), and jars.js (the page
         controller, which imports all four via flat serving-path specifiers)
         are all real ES modules (type="module"). The module loader guarantees
         the dependencies; the explicit tag order is kept for load-order
         legibility (the module map dedupes evaluation). The script-tag
         contract test (test/unit/jars-page-shared-scripts.test.js) pins this
         all-module tag set and would flag any future classic script (the F2 D1
         shared-scope-collision lesson). -->
    <script src="burner.js" type="module"></script>
    <script src="jar-data-classes.js" type="module"></script>
    <script src="safe-color.js" type="module"></script>
    <script src="jar-page-model.js" type="module"></script>
    <script src="jar-panel-model.js" type="module"></script>
    <script src="jars.js" type="module"></script>
  </head>
  <body>
    <!-- Master-detail layout (Leg 2 / DD1): settings.html's nav+main structure,
         adapted for DYNAMIC content (jars.js rebuilds #jars-nav and
         #jars-sections from every jars-changed broadcast — settings' own nav
         is static HTML). "+ New jar" moved here from the old header row. -->
    <nav aria-label="Jars">
      <ul id="jars-nav" role="list"></ul>
      <button id="jars-new" class="jar-btn jar-btn-primary" type="button" aria-expanded="false">+ New jar</button>
    </nav>
    <main>
      <div class="jars-header">
        <h1>Cookie Jars</h1>

        <!-- Static intro copy (HAT step-1 finding F2) — textContent-equivalent
             static markup, no dynamic data. -->
        <p class="jars-description">
          Each cookie jar keeps its own cookies, sign-ins, and site data — sites in
          one jar can't see another. New tabs open in the default jar; Burner tabs
          evaporate when closed.
        </p>
      </div>

      <!-- Reserved page-level error line (Leg 2) — used for actions that aren't
           scoped to a section (e.g. set-default). textContent-set only; never
           thrown to console-only. -->
      <p id="jars-page-error" class="jar-error-line" aria-live="polite"></p>

      <!-- One always-expanded <section id="jar-{id}"> per jar (incl. Burner,
           read-only) — reconciled per-section, keyed by jar id (Leg 2 / DD6).
           NO aria-live here (FD ruling): it reconciles on every jars-changed
           broadcast from ANY surface, which would be announcement spam. The
           live regions are exactly #jars-page-error and each section's own
           error line.

           The create-jar form panel (#jars-create-panel, ui.mode === 'create')
           is NOT static markup here (HAT step-2 finding F4: the form must
           render where its result lands — immediately before the Burner
           section, after the last persistent jar's section — a position that
           varies with the persistent-jar count, so it can't be a fixed spot
           in static HTML). jars.js builds it as a single stable DOM node and
           anchors it dynamically into this container (anchorCreatePanel).
           Its CONTENTS are still rebuilt only on an actual ui.mode open/close
           transition (Leg 2, unchanged) — a state-only render pass leaves an
           open panel's DOM untouched so an in-progress name/color pick
           survives an unrelated broadcast; its POSITION moves only via a
           single conditional insertBefore call, which never disturbs
           focus/caret inside it. -->
      <div id="jars-sections"></div>
    </main>
  </body>
</html>
