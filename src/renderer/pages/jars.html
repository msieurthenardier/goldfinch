<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie Jars — Goldfinch</title>
    <link rel="stylesheet" href="jars.css" />
    <!-- Script order (leg spec): burner.js declares the frozen BURNER identity;
         safe-color.js is the injection-safe color validator; jar-page-model.js is
         the pure row-model consuming both; jars.js is the page controller. All four
         share ONE top-level lexical scope (classic non-module <script> tags) — see
         the F2 D1 shared-scope-collision lesson pinned in
         test/unit/jars-page-shared-scripts.test.js. -->
    <script src="burner.js"></script>
    <script src="safe-color.js"></script>
    <script src="jar-page-model.js"></script>
    <script src="jars.js" defer></script>
  </head>
  <body>
    <main>
      <div class="jars-header">
        <div class="jars-header-row">
          <h1>Cookie Jars</h1>
          <button id="jars-new" class="jar-btn jar-btn-primary" type="button">+ New jar</button>
        </div>

        <!-- Static intro copy (HAT step-1 finding F2) — textContent-equivalent
             static markup, no dynamic data. Grouped inside the header block
             (HAT follow-up F5) so it sits above the divider with the heading
             and "+ New jar" row, not below it with the list. -->
        <p class="jars-description">
          Each cookie jar keeps its own cookies, sign-ins, and site data — sites in
          one jar can't see another. New tabs open in the default jar; Burner tabs
          evaporate when closed.
        </p>
      </div>

      <!-- Reserved page-level error line (Leg 2) — used for actions that aren't
           scoped to a form (e.g. set-default). textContent-set only; never thrown
           to console-only. -->
      <p id="jars-page-error" class="jar-error-line" aria-live="polite"></p>

      <!-- Create-jar form panel, shown/hidden by jars.js (ui.mode === 'create'). -->
      <div id="jars-create-panel"></div>

      <!-- aria-live region: the list wholesale-re-renders on every jars-changed
           broadcast (page mutations, the picker's quick-create, automation). -->
      <ul id="jars-list" class="jars-list" aria-live="polite" aria-label="Cookie jars">
      </ul>
    </main>
  </body>
</html>
