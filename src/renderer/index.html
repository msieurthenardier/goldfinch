<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http: blob:; media-src 'self' https: http: blob:;"
    />
    <title>Goldfinch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Tab strip -->
    <div id="tabstrip">
      <div id="tabs" role="tablist" aria-label="Open tabs"></div>
      <div id="newtab-pill">
        <button id="new-tab" class="icon-btn" title="New tab (Ctrl+T)" aria-label="New tab">+</button>
        <button
          id="new-tab-menu"
          class="icon-btn"
          title="New tab in a jar / container"
          aria-label="New tab in a container"
          aria-haspopup="menu"
          aria-expanded="false"
        >
          ▾
        </button>
      </div>
      <div id="tabstrip-drag"></div>
      <div id="window-controls">
        <button id="win-min" class="icon-btn win-ctrl" title="Minimize" aria-label="Minimize"></button>
        <button
          id="win-max"
          class="icon-btn win-ctrl"
          title="Maximize"
          aria-label="Maximize"
          data-state="normal"
        ></button>
        <button id="win-close" class="icon-btn win-ctrl win-close" title="Close" aria-label="Close"></button>
      </div>
    </div>
    <div id="container-menu" class="hidden" role="menu" aria-label="Open new tab in a container"></div>
    <div id="kebab-menu" class="hidden" role="menu" aria-label="More menu">
      <button id="kebab-settings" class="cm-item" role="menuitem" tabindex="0">Settings</button>
      <button id="kebab-exit" class="cm-item" role="menuitem" tabindex="-1">Exit</button>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <img id="brand" src="assets/goldfinch_color.png" alt="Goldfinch" title="Goldfinch" />
      <button id="back" class="icon-btn" title="Back" aria-label="Back">◀</button>
      <button id="forward" class="icon-btn" title="Forward" aria-label="Forward">▶</button>
      <button id="reload" class="icon-btn" title="Reload" aria-label="Reload">⟳</button>
      <div id="address-wrap">
        <input
          id="address"
          type="text"
          spellcheck="false"
          placeholder="Search or enter address"
          autocomplete="off"
          aria-label="Address and search bar"
        />
      </div>
      <button id="toggle-media" class="text-btn" title="Toggle media panel (Ctrl+M)" aria-expanded="false">
        <span id="media-count">Media</span>
      </button>
      <button id="toggle-privacy" class="text-btn" title="Toggle privacy panel (Ctrl+Shift+P)" aria-expanded="false">
        <span id="privacy-count">Shield</span>
      </button>
      <button
        id="kebab"
        class="icon-btn"
        title="More"
        aria-label="More"
        aria-haspopup="menu"
        aria-expanded="false"
      >⋮</button>
    </div>

    <!-- Main area: web content + media panel -->
    <div id="main">
      <div id="webviews"></div>

      <aside id="media-panel" class="collapsed" aria-label="Media panel">
        <div id="media-panel-header">
          <h2>Media on this page</h2>
          <div class="panel-actions">
            <button
              id="media-download-selected"
              class="text-btn small"
              title="Download the selected media to a folder"
              disabled
            >
              Download selected
            </button>
            <button id="media-rescan" class="text-btn small" title="Rescan">Rescan</button>
            <button id="media-close" class="icon-btn" title="Close" aria-label="Close media panel">✕</button>
          </div>
        </div>
        <div id="media-filters">
          <button class="filter active" data-filter="all" aria-pressed="true">All</button>
          <button class="filter" data-filter="image" aria-pressed="false">Images</button>
          <button class="filter" data-filter="video" aria-pressed="false">Video</button>
          <button class="filter" data-filter="audio" aria-pressed="false">Audio</button>
          <button class="filter" data-filter="embed" aria-pressed="false">Embeds</button>
        </div>
        <div id="media-list"></div>
        <div id="media-empty" class="hidden">No media found on this page yet.</div>

        <!-- Docked old-school music player -->
        <div id="player" class="hidden">
          <div id="player-title">—</div>
          <div id="player-seek" title="Seek"><div id="player-progress"></div></div>
          <div id="player-bar">
            <span id="player-cur" class="lcd">0:00</span>
            <div id="player-controls">
              <button id="player-prev" title="Previous" aria-label="Previous track">◀◀</button>
              <button id="player-play" title="Play / Pause" aria-label="Play / pause">▶</button>
              <button id="player-next" title="Next" aria-label="Next track">▶▶</button>
            </div>
            <span id="player-dur" class="lcd">0:00</span>
          </div>
          <audio id="player-audio"></audio>
        </div>
      </aside>

      <aside id="privacy-panel" class="collapsed" aria-label="Privacy panel">
        <div id="privacy-header">
          <h2>Privacy on this page</h2>
          <div class="panel-actions">
            <button id="privacy-refresh" class="text-btn small" title="Refresh">Refresh</button>
            <button id="privacy-close" class="icon-btn" title="Close" aria-label="Close privacy panel">✕</button>
          </div>
        </div>
        <div id="privacy-body"></div>
      </aside>
    </div>

    <!-- Download toasts -->
    <div id="toasts" role="status" aria-live="polite" aria-atomic="false"></div>
    <!-- Visually-hidden live region for media-panel status announcements -->
    <div id="media-status" class="sr-only" role="status" aria-live="polite"></div>

    <!-- Image lightbox with zoom + pan -->
    <div id="lightbox" class="hidden" role="dialog" aria-modal="true" aria-label="Image viewer">
      <div id="lightbox-toolbar">
        <span id="lightbox-caption"></span>
        <div class="lightbox-zoom">
          <button id="lightbox-zoom-out" class="icon-btn" title="Zoom out (-)" aria-label="Zoom out">−</button>
          <span id="lightbox-zoom-level">100%</span>
          <button id="lightbox-zoom-in" class="icon-btn" title="Zoom in (+)" aria-label="Zoom in">+</button>
          <button id="lightbox-zoom-reset" class="text-btn small" title="Reset (0)">Fit</button>
          <button id="lightbox-close" class="icon-btn" title="Close (Esc)" aria-label="Close image viewer">✕</button>
        </div>
      </div>
      <div id="lightbox-stage"></div>
    </div>

    <script src="../shared/url-safety.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
