<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http: blob:; media-src 'self' https: http: blob:;"
    />
    <title>Goldfinch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Tab strip -->
    <div id="tabstrip">
      <div id="tabs" role="tablist" aria-label="Open tabs"></div>
      <div id="newtab-pill">
        <button id="new-tab" class="icon-btn" title="New tab (Ctrl+T)" aria-label="New tab">+</button>
        <button
          id="new-tab-menu"
          class="icon-btn"
          title="New tab in a jar / container"
          aria-label="New tab in a container"
          aria-haspopup="menu"
          aria-expanded="false"
        >
          ▾
        </button>
      </div>
      <div id="tabstrip-drag"></div>
      <div id="window-controls">
        <button id="win-min" class="icon-btn win-ctrl" title="Minimize" aria-label="Minimize"></button>
        <button
          id="win-max"
          class="icon-btn win-ctrl"
          title="Maximize"
          aria-label="Maximize"
          data-state="normal"
        ></button>
        <button id="win-close" class="icon-btn win-ctrl win-close" title="Close" aria-label="Close"></button>
      </div>
    </div>
    <!-- All popup menus (kebab / container / site-info / page-context) and the
         new-container dialog render in the menu-overlay SHEET (menu-overlay.html,
         a transparent WebContentsView above the guest — M05 F8); the chrome keeps
         only their trigger buttons. -->
    <!-- Toolbar -->
    <div id="toolbar">
      <img id="brand" src="assets/goldfinch_color.png" alt="Goldfinch" title="Goldfinch" />
      <button id="back" class="icon-btn" title="Back" aria-label="Back">◀</button>
      <button id="forward" class="icon-btn" title="Forward" aria-label="Forward">▶</button>
      <button id="reload" class="icon-btn" title="Reload" aria-label="Reload">⟳</button>
      <div id="address-wrap" role="search">
        <button id="address-chip" class="addr-chip" type="button" aria-label="Site information" aria-haspopup="dialog"></button>
        <input
          id="address"
          type="text"
          spellcheck="false"
          placeholder="Search or enter address"
          autocomplete="off"
          aria-label="Address and search bar"
        />
        <!-- In-address-bar page-zoom control (HAT redesign, replaces the old toolbar #zoom-chip).
             Right-justified inside the rounded address field. Faded out at steady state; revealed
             on #address-wrap:hover / :focus-within and briefly after each zoom change (.zoom-control--peek).
             Hidden entirely on internal goldfinch:// tabs. The − / % / + / reset reuse the leg-1
             zoom-apply IPC; the % reflects the active tab's live factor (shown even at 100%). -->
        <div id="zoom-control" aria-hidden="false">
          <button id="zoom-out" class="zoom-btn" type="button" aria-label="Zoom out">−</button>
          <span id="zoom-percent" role="status" aria-live="off">100%</span>
          <button id="zoom-in" class="zoom-btn" type="button" aria-label="Zoom in">+</button>
          <button id="zoom-reset" class="zoom-btn" type="button" title="Reset zoom to 100%" aria-label="Reset zoom to 100%">⟳</button>
        </div>
      </div>
      <!-- Icons: Lucide (ISC license) — inline SVG path data, CSP-safe -->
      <button id="toggle-media" class="icon-btn" title="Toggle media panel (Ctrl+M)" aria-label="Media" aria-expanded="false">
        <svg class="tb-glyph" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 4"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>
        <span id="media-count" class="tb-badge hidden" aria-hidden="true"></span>
      </button>
      <button id="toggle-privacy" class="icon-btn" title="Toggle privacy panel (Ctrl+Shift+P)" aria-label="Shields" aria-expanded="false">
        <svg class="tb-glyph" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        <span id="privacy-count" class="tb-badge hidden" aria-hidden="true"></span>
      </button>
      <!-- DevTools toggle (SC5/DD3). Pinnable (toolbarPins.devtools, default unpinned); a toggle
           reflecting the active web tab's DevTools open state via aria-pressed (NOT aria-expanded —
           it does not control an in-page panel). Inert on internal tabs (click no-ops, not hidden). -->
      <button id="toggle-devtools" class="icon-btn" type="button" title="DevTools (F12)" aria-label="DevTools" aria-pressed="false">
        <svg class="tb-glyph" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/></svg>
      </button>
      <!-- Automation ("robot") indicator (F7, Flight 3 Leg 6 HAT — operator ruling;
           was SC10/DD6's connection-active-only indicator before F7). Always present,
           hidden until >=1 automation key is ENABLED (jar or admin) regardless of live
           connections; the badge counts ENABLED jar keys. Grayed out (idle) with no
           active connection; tinted with the active jar's color when exactly one jar
           is connected; a neutral accent for multiple simultaneously active jars;
           animated rainbow when the admin key is enabled AND active. Self-manages
           .hidden/.automation-* via buildAutomationIndicatorModel (NOT a pinnable
           item — applyToolbarPins must never touch it). -->
      <button id="automation-indicator" class="icon-btn hidden" type="button" title="Automation" aria-label="Automation sessions">
        <svg class="tb-glyph" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        <span id="automation-indicator-badge" class="tb-badge hidden" aria-hidden="true"></span>
      </button>
      <button
        id="kebab"
        class="icon-btn"
        title="More"
        aria-label="More"
        aria-haspopup="menu"
        aria-expanded="false"
      >⋮</button>
    </div>

    <!-- Main area: web content + media panel -->
    <div id="main">
      <div id="webviews"></div>

      <aside id="media-panel" class="collapsed" aria-label="Media panel">
        <div id="media-panel-header">
          <h2>Media on this page</h2>
          <div class="panel-actions">
            <button
              id="media-download-selected"
              class="text-btn small"
              title="Download the selected media to a folder"
              disabled
            >
              Download selected
            </button>
            <button id="media-rescan" class="text-btn small" title="Rescan">Rescan</button>
            <button id="media-close" class="icon-btn" title="Close" aria-label="Close media panel">✕</button>
          </div>
        </div>
        <div id="media-filters">
          <button class="filter active" data-filter="all" aria-pressed="true">All</button>
          <button class="filter" data-filter="image" aria-pressed="false">Images</button>
          <button class="filter" data-filter="video" aria-pressed="false">Video</button>
          <button class="filter" data-filter="audio" aria-pressed="false">Audio</button>
          <button class="filter" data-filter="embed" aria-pressed="false">Embeds</button>
        </div>
        <div id="media-list"></div>
        <div id="media-empty" class="hidden">No media found on this page yet.</div>

        <!-- Docked old-school music player -->
        <div id="player" class="hidden">
          <div id="player-title">—</div>
          <div id="player-seek" title="Seek"><div id="player-progress"></div></div>
          <div id="player-bar">
            <span id="player-cur" class="lcd">0:00</span>
            <div id="player-controls">
              <button id="player-prev" title="Previous" aria-label="Previous track">◀◀</button>
              <button id="player-play" title="Play / Pause" aria-label="Play / pause">▶</button>
              <button id="player-next" title="Next" aria-label="Next track">▶▶</button>
            </div>
            <span id="player-dur" class="lcd">0:00</span>
          </div>
          <audio id="player-audio"></audio>
        </div>
      </aside>

      <aside id="privacy-panel" class="collapsed" aria-label="Privacy panel">
        <div id="privacy-header">
          <h2>Privacy on this page</h2>
          <div class="panel-actions">
            <button id="privacy-refresh" class="text-btn small" title="Refresh">Refresh</button>
            <button id="privacy-close" class="icon-btn" title="Close" aria-label="Close privacy panel">✕</button>
          </div>
        </div>
        <div id="privacy-body"></div>
      </aside>
    </div>

    <!-- Download toasts -->
    <div id="toasts" role="status" aria-live="polite" aria-atomic="false"></div>
    <!-- Visually-hidden live region for media-panel status announcements -->
    <div id="media-status" class="sr-only" role="status" aria-live="polite"></div>

    <!-- Image lightbox with zoom + pan -->
    <div id="lightbox" class="hidden" role="dialog" aria-modal="true" aria-label="Image viewer">
      <div id="lightbox-toolbar">
        <span id="lightbox-caption"></span>
        <div class="lightbox-zoom">
          <button id="lightbox-zoom-out" class="icon-btn" title="Zoom out (-)" aria-label="Zoom out">−</button>
          <span id="lightbox-zoom-level">100%</span>
          <button id="lightbox-zoom-in" class="icon-btn" title="Zoom in (+)" aria-label="Zoom in">+</button>
          <button id="lightbox-zoom-reset" class="text-btn small" title="Reset (0)">Fit</button>
          <button id="lightbox-close" class="icon-btn" title="Close (Esc)" aria-label="Close image viewer">✕</button>
        </div>
      </div>
      <div id="lightbox-stage"></div>
    </div>

    <script src="../shared/url-safety.js"></script>
    <script src="../shared/keydown-action.js"></script>
    <script src="../shared/site-info.js"></script>
    <script src="../shared/burner.js"></script>
    <script src="../shared/container-menu.js"></script>
    <script src="../shared/page-context-model.js"></script>
    <script src="../shared/default-routing.js"></script>
    <script src="../shared/inherit-container.js"></script>
    <!-- safe-color.js MUST load before automation-indicator-model.js (F7): the
         model's jar-color resolution defense-in-depth-checks isSafeColor. -->
    <script src="../shared/safe-color.js"></script>
    <script src="../shared/automation-indicator-model.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
