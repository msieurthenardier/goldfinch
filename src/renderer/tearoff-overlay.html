<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No scripts, no external assets: the pill is pure paint (AC3). style-src
         'unsafe-inline' is the one relaxation — there is nothing scriptable to protect. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'" />
    <title>Tear-off hint</title>
    <style>
      /* body pointer-events:none (AC3) — the pill can never intercept guest/strip input,
         even though the view is sized to the pill only. */
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
        pointer-events: none;
      }
      #pill {
        display: inline-block;
        margin: 2px; /* room for the shadow inside the view rect */
        padding: 4px 10px;
        border-radius: 6px;
        background: #f5c518; /* --accent, literal (this document does not load styles.css) */
        color: #1a1a1a;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-size: 12px;
        white-space: nowrap;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="pill">Release to open in a new window</div>
  </body>
</html>
