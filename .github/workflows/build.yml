name: Build installers

# Build desktop installers for Windows, macOS, and Linux.
# - Run manually from the Actions tab (workflow_dispatch), or
# - Push a version tag like v0.1.0 to also publish a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Least privilege: every job starts read-only; only the publishing jobs
# (release, update-readme) escalate to contents: write per-job below.
permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # On a v* tag, the tag is the source of truth for the release version:
      # sync package.json so installer names/metadata match without a manual bump.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      - name: Build ${{ matrix.platform }} installers
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple/Windows signing certs in CI -> produce unsigned builds.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: goldfinch-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      is_stable: ${{ steps.ver.outputs.is_stable }}
    steps:
      - name: Validate semver tag and classify stability
        id: ver
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "$ver" =~ $semver ]]; then
            echo "::error::Tag '$tag' is not strict semver (vMAJOR.MINOR.PATCH[-prerelease][+build]); refusing to publish."
            exit 1
          fi
          core="${ver%%+*}"
          if [[ "$core" == *-* ]]; then
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "Validated '$tag' as a PRERELEASE ($ver)."
          else
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
            echo "Validated '$tag' as a STABLE release ($ver)."
          fi

      - name: Download all installers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: ${{ steps.ver.outputs.is_stable != 'true' }}

  # After a release is published, point the README's download links at the new
  # version and commit it back to main.
  update-readme:
    name: Update README download links
    if: ${{ needs.release.outputs.is_stable == 'true' }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main

      - name: Regenerate download section for ${{ github.ref_name }}
        run: node scripts/update-readme.mjs "${GITHUB_REF_NAME#v}"

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update download links for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
