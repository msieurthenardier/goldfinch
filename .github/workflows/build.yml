name: Build installers

# Build desktop installers for Windows, macOS, and Linux.
# - Push a version tag like v0.1.0 -> build all platforms and publish a GitHub Release.
# - Run manually (workflow_dispatch) -> build-only smoke check (no publish).
#
# Installers are published DIRECTLY to the GitHub Release by electron-builder
# (`--publish always`), NOT round-tripped through Actions artifact storage. The
# artifact-storage path repeatedly failed: the free 500 MB tier filled with the
# ~530 MB-per-platform builds and blocked the v0.5.0 / v0.5.1 release uploads
# ("Artifact storage quota has been hit"). Publishing straight to the Release
# removes that dependency entirely.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Least privilege: read-only by default; only the jobs that touch the Release /
# main escalate to contents: write per-job below.
permissions:
  contents: read

jobs:
  # Create the draft Release once (tags only), with auto-generated notes, so the
  # parallel platform builds upload into ONE existing release instead of racing
  # to create it. Also validates the tag is strict semver and classifies stability.
  create-release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      is_stable: ${{ steps.ver.outputs.is_stable }}
    steps:
      - name: Validate semver tag and classify stability
        id: ver
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "$ver" =~ $semver ]]; then
            echo "::error::Tag '$tag' is not strict semver (vMAJOR.MINOR.PATCH[-prerelease][+build]); refusing to publish."
            exit 1
          fi
          core="${ver%%+*}"
          if [[ "$core" == *-* ]]; then
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "Validated '$tag' as a PRERELEASE ($ver)."
          else
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
            echo "Validated '$tag' as a STABLE release ($ver)."
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create the draft release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # electron-builder uploads assets into the release whose tag is v{version};
          # pre-create it as a DRAFT with generated notes so notes survive and the
          # three matrix jobs don't race to create it. Idempotent: reuse if present.
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — reusing."
          else
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --draft --generate-notes --title "${GITHUB_REF_NAME}"
          fi

  build:
    name: Build (${{ matrix.platform }})
    needs: create-release
    # Run on a tag (after the draft exists) AND on manual dispatch (build-only,
    # where create-release is skipped). `always()` lets this run despite the
    # skipped dependency on dispatch.
    if: always() && (needs.create-release.result == 'success' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # electron-builder uploads installers to the Release on a tag
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # On a v* tag, the tag is the source of truth for the release version:
      # sync package.json so installer names/metadata AND electron-builder's
      # target release tag (v{version}) match the git tag without a manual bump.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      # Tag -> `always` (publish installers straight into the draft Release).
      # Dispatch -> `never` (build-only smoke check; nothing is published/stored).
      - name: Build ${{ matrix.platform }} installers
        run: npx electron-builder --${{ matrix.platform }} --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple/Windows signing certs in CI -> produce unsigned builds.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  # Flip the draft Release to published once all platforms have uploaded.
  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          stable='${{ needs.create-release.outputs.is_stable }}'
          if [[ "$stable" == "true" ]]; then
            gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --draft=false --prerelease=false --latest
          else
            gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --draft=false --prerelease=true
          fi

  # After a stable release publishes, point the README's download links at the
  # new version and commit it back to main.
  update-readme:
    name: Update README download links
    if: ${{ needs.create-release.outputs.is_stable == 'true' }}
    needs: [create-release, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Regenerate download section for ${{ github.ref_name }}
        run: node scripts/update-readme.mjs "${GITHUB_REF_NAME#v}"

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update download links for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
