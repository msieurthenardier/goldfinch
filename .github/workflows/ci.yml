name: CI

# Fast pull-request check: verifies the app installs and packages (compile +
# bundle) on Linux only. The full Windows/macOS/Linux installer matrix lives in
# build.yml and runs on releases (v* tags) / manual dispatch — so PRs don't
# burn macOS runner minutes.
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: Build check (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Package (no installers)
        run: npx electron-builder --linux --dir
