name: CI

# Fast pull-request check: verifies the app installs and packages (compile +
# bundle) on Linux only. The full Windows/macOS/Linux installer matrix lives in
# build.yml and runs on releases (v* tags) / manual dispatch — so PRs don't
# burn macOS runner minutes.
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-check:
    name: Build check (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Audit-gate triage policy: a high here is actionable ONLY by updating the
      # offending dependency — never by lowering --audit-level or deleting this step.
      # Distinguish a high in the dev-only tree (e.g. electron-builder's transitive
      # chain: tar/cacache/node-gyp — build-time only, not shipped) from a high in
      # runtime `electron` itself (shipped, hostile-content-reachable). Both are fixed
      # by bumping the dep (Dependabot surfaces these); the gate stays at high.
      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Package (no installers)
        run: npx electron-builder --linux --dir
