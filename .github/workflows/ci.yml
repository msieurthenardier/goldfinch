name: CI

# CI MOVED TO LOCAL CONCOURSE (to conserve GitHub Actions minutes).
# The PR-equivalent check suite (test/typecheck/lint/audit/package-linux) now
# runs on the local Concourse instance — see ci/README.md and ci/pipeline.yml.
#   - Pre-push, against your working tree:
#       fly -t local-goldfinch execute -c ci/tasks/test.yml -i repo=.
#   - Automatically on every push to main: the `ci` job in ci/pipeline.yml.
#
# This workflow is kept as a manual-only fallback (workflow_dispatch) for when
# Concourse is unavailable; its automatic pull_request trigger is intentionally
# disabled so PRs no longer consume Actions minutes. build.yml (releases) is
# untouched and remains the real release path.
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-check:
    name: Build check (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Audit-gate triage policy: a high here is actionable ONLY by updating the
      # offending dependency — never by lowering --audit-level or deleting this step.
      # Distinguish a high in the dev-only tree (e.g. electron-builder's transitive
      # chain: tar/cacache/node-gyp — build-time only, not shipped) from a high in
      # runtime `electron` itself (shipped, hostile-content-reachable). Both are fixed
      # by bumping the dep (Dependabot surfaces these); the gate stays at high.
      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Package (no installers)
        run: npx electron-builder --linux --dir
